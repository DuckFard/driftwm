[ui]
scale = 1.5

[task_manager]
mode = "system"
disk_path = "/"
cpu_critical = 80
memory_critical = 80
disk_critical = 80

[ame]
debug = false
scale = 1.5
update_ms = 250
stream_start_hour = 22
stream_end_hour = 5
default_love = 20
default_darkness = 6

[jine]
message_interval_seconds = 60
stickers = ["ok", "omg", "sad", "idc", "sorry", "ded", "love", "this"]

[social_media]
screen_time_retweet_scale = 8
screen_time_like_scale = 11

[media_player]
preferred_player = ""

[media_player.special_title_images]
"internet overdose" = "overdose.png"
"internet yamero" = "yamero.png"
"yamero" = "yamero.png"
"it's raining after all" = "yappari.png"
"raining after all" = "yappari.png"
"under the summer breeze" = "breeze.png"
"my time" = "close.png"
"cubism" = "picasso.png"
"cubibibibibism" = "picacacacacasso.png"
"i am a fake picasso" = "picasso.png"
"picasso" = "picasso.png"
"breeze" = "breeze.png"
"yappari" = "yappari.png"

[calendar]
hour24 = false

[calendar.weather]
# Weather remains idle until OpenWeatherMap credentials are supplied. The
# upstream-compatible user-facing keys are `ApiKey` and `LocationCode`; these
# snake_case defaults keep the same model for Nix-friendly config.
enabled = false
provider = "openweathermap"
api_key = ""
# Matches the upstream Rainmeter `LocationCode` setting. OpenWeatherMap city
# IDs are visible in URLs such as https://openweathermap.org/city/2643743.
location_code = ""
units = "metric"
refresh_minutes = 60

